name: Feature request
description: Propose an improvement to PDFRejuvenator.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or output problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should PDFRejuvenator do?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation idea
      description: How could this be tested without private source documents?
    validations:
      required: false
