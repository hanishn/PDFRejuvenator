name: Bug report
description: Report a reproducible PDFRejuvenator problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command that reproduced the issue. Remove private paths or filenames if needed.
      render: powershell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation output
      description: Include `python scripts\validate_pdfrejuvenator.py` output if available.
      render: text
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Do not attach private PDFs or extracted private text.
    validations:
      required: false
