name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run PDFRejuvenator validation
        run: python scripts\validate_pdfrejuvenator.py

      - name: Scrub public export
        run: python scripts\scrub_public_export.py

      - name: Check command line entry point
        run: |
          python -m pdfrejuvenator --help
          python -m pdfrejuvenator process --help
          python -m pdfrejuvenator search --help

      - name: Lint public Python surface
        run: python -m ruff check --no-cache pdfrejuvenator scripts src
